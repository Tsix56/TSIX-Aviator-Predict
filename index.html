<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TSIX VIP PRO</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    max-width:550px;
    margin:auto;
    background:#1e293b;
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
}

input,button,textarea{
    width:100%;
    padding:14px;
    margin-top:10px;
    border-radius:15px;
    border:none;
    font-size:18px;
}

button{
    background:#7c3aed;
    color:white;
    font-weight:bold;
}

#writeBox{display:none;}

.result{
    background:#334155;
    margin-top:15px;
    padding:15px;
    border-radius:15px;
    text-align:left;
    white-space:pre-line;
    font-size:20px;
}

/* VIRTUEL */
.row{display:flex;gap:10px;}
.side{
    flex:1;
    background:#111827;
    padding:15px;
    border-radius:15px;
}

.bigBtn{
    width:110px;
    height:75px;
    margin:5px;
    font-size:26px;
    border-radius:18px;
    background:#374151;
    color:white;
}

.bigBtn.active{background:#22c55e;}

.titleSide{font-size:20px;margin-bottom:10px;}
.red{color:red;}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="login">
<h2>TSIX VIP PRO</h2>
<input type="password" id="pass" placeholder="Mot de passe">
<button onclick="login()">ENTRER</button>
</div>

<!-- APP -->
<div id="app">

<!-- WRITE (Tsitsi only) -->
<div class="container" id="writeBox">
<h3>✍️ Mpanoratra (Tsitsi)</h3>
<textarea id="message" placeholder="Soraty eto..."></textarea>
<button onclick="sendMessage()">Alefa</button>
</div>

<!-- POSTS -->
<div class="container">
<h2>💬 Messages</h2>
<div id="posts"></div>
</div>

<!-- VIRTUEL -->
<div class="container">
<h2>⚽ VIRTUEL PREDICT PRO</h2>

<div class="row">

<div class="side">
<div class="titleSide">1</div>

<button class="bigBtn" onclick="setVal('l','type','Pc',this)">Pc</button>
<button class="bigBtn" onclick="setVal('l','type','Gc',this)">Gc</button>
<br>
<button class="bigBtn" onclick="setVal('l','arrow','⬆️',this)">⬆️</button>
<button class="bigBtn" onclick="setVal('l','arrow','⬇️',this)">⬇️</button>
<br>
<button class="bigBtn" onclick="setVal('l','sign','➖',this)">➖</button>
<button class="bigBtn" onclick="setVal('l','sign','✖️',this)">✖️</button>
<button class="bigBtn" onclick="setVal('l','sign','✅',this)">✅</button>

</div>

<div class="side">
<div class="titleSide">2</div>

<button class="bigBtn" onclick="setVal('r','type','Pc',this)">Pc</button>
<button class="bigBtn" onclick="setVal('r','type','Gc',this)">Gc</button>
<br>
<button class="bigBtn" onclick="setVal('r','arrow','⬆️',this)">⬆️</button>
<button class="bigBtn" onclick="setVal('r','arrow','⬇️',this)">⬇️</button>
<br>
<button class="bigBtn" onclick="setVal('r','sign','➖',this)">➖</button>
<button class="bigBtn" onclick="setVal('r','sign','✖️',this)">✖️</button>
<button class="bigBtn" onclick="setVal('r','sign','✅',this)">✅</button>

</div>

</div>

<button onclick="predictVirtuel()">PREDICT</button>
<div class="result" id="virtuelResult"></div>
</div>

<!-- AVIATOR -->
<div class="container">
<h2>✈️ AVIATOR PREDICT PRO</h2>

<input id="time" placeholder="12:19:50">
<input id="coteA" placeholder="1.75">

<button onclick="predictAviator()">PREDICT</button>
<div class="result" id="aviatorResult"></div>
</div>

<!-- FOOTER -->
<div class="container">
👉 araho ito pejy ito:<br>
https://www.facebook.com/profile.php?id=61579106375751
</div>

</div>

<script>

/* LOGIN */
let role="";

function login(){
    let p=document.getElementById("pass").value;

    if(p==="larokaman"){
        role="viewer";
        document.getElementById("login").style.display="none";
        document.getElementById("app").style.display="block";
    }
    else if(p==="tsitsi"){
        role="admin";
        document.getElementById("login").style.display="none";
        document.getElementById("app").style.display="block";
        document.getElementById("writeBox").style.display="block";
    }
    else alert("Mot de passe diso ❌");
}

/* MESSAGE */
function sendMessage(){
    if(role!=="admin") return;

    let t=document.getElementById("message").value;
    if(!t)return;

    let d=document.createElement("div");
    d.className="result";
    d.innerText=t;

    document.getElementById("posts").appendChild(d);
}

/* VIRTUEL */
let L={},R={};

function setVal(s,c,v,e){
    let o=s==="l"?L:R;
    o[c]=v;
    e.classList.add("active");
}

/* STRATEGIE FENO (copie-nao) */
const rules={

"Gc⬆️➖|Pc⬇️➖":"1 boom🏅",
"Pc⬆️➖|Gc⬇️➖":"Tsy mbola misy strategie 😭",
"Gc⬇️➖|Pc⬆️➖":"Match nul 👌",
"Pc⬇️➖|Gc⬆️➖":"1 boom🏅",

"Gc⬆️✖️|Pc⬇️➖":"1 boom🏅",
"Pc⬆️✖️|Gc⬇️➖":"1 boom🏅",
"Gc⬇️✖️|Pc⬆️➖":"1 boom🏅",
"Pc⬇️✖️|Gc⬆️➖":"1 boom🏅",

"Gc⬇️➖|Pc⬆️✖️":"2 boom🏅",
"Pc⬇️➖|Gc⬆️✖️":"2 boom🏅",

"Pc⬆️➖|Gc⬇️➖":"Tsy mbola misy strategie 😭",
"Pc⬆️➖|Gc⬇️✖️":"Tsy mbola misy strategie 😭",

"Gc⬆️➖|Pc⬇️✖️":"Tsy mbola misy strategie 😭",

"Gc⬆️✅|Pc⬇️➖":"Tsy mbola misy strategie 😭",
"Pc⬆️✅|Gc⬇️➖":"Tsy mbola misy strategie 😭",
"Pc⬇️➖|Gc⬆️✅":"Tsy mbola misy strategie 😭",
"Gc⬇️➖|Pc⬆️✅":"2 boom🏅",

"Pc⬆️➖|Gc⬇️✅":"1 boom🏅",

"Gc⬆️✖️|Pc⬇️✖️":"1x boom 🏅 match nul possible 👌",
"Pc⬆️✖️|Gc⬇️✖️":"1x boom 🏅 match nul possible 👌"
};

/* VIRTUEL */
function predictVirtuel(){

if(!L.type||!L.arrow||!L.sign||!R.type||!R.arrow||!R.sign){
alert("Fenoy tsara");
return;
}

let key=L.type+L.arrow+L.sign+"|"+R.type+R.arrow+R.sign;

document.getElementById("virtuelResult").innerHTML=
`<div style="font-size:26px;font-weight:bold">${rules[key]||"Tsy mbola misy strategie 😭"}</div>`;
}

/* AVIATOR PRO (FENO SAFE + MULTI OUTPUT) */
function addTime(time,sec){
let t=time.split(":");
let d=new Date();
d.setHours(t[0]);d.setMinutes(t[1]);d.setSeconds(t[2]);
d.setSeconds(d.getSeconds()+sec);
return d.toTimeString().split(" ")[0];
}

function predictAviator(){

let time=document.getElementById("time").value;
let cote=parseFloat(document.getElementById("coteA").value);

if(!time||isNaN(cote)){
alert("Fenoy tsara");
return;
}

let r=document.getElementById("aviatorResult");
r.innerHTML="";

function show(t,x){
r.innerHTML+=`<div class="result"><b>${t}</b> → ${x}</div>`;
}

/* FULL LOGIC PRO */
if(cote>=10){
show(addTime(time,40),"🟣 VIOLET HIGH");
show(addTime(time,70),"🔵 BLUE SAFE");
show(addTime(time,110),"🟣 VIOLET CONFIRM");
}
else if(cote>=5){
show(addTime(time,60),"🟣 60% VIOLET");
show(addTime(time,100),"🔵 40% BLUE");
}
else if(cote>=2){
show(addTime(time,80),"🟣 TREND VIOLET");
show(addTime(time,130),"🟣 STABLE PATTERN");
}
else{
show(addTime(time,100),"🟣 RANDOM ZONE");
show(addTime(time,160),"🔵 RANDOM ZONE");
}
}

</script>

</body>
</html>
