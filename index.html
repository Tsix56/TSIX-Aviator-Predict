<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TSIX VIP PRO</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    max-width:520px;
    margin:auto;
    background:#1e293b;
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
}

input,button,textarea{
    width:100%;
    padding:14px;
    margin-top:10px;
    border-radius:15px;
    border:none;
    font-size:18px;
}

button{
    background:#7c3aed;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.result{
    background:#334155;
    margin-top:15px;
    padding:15px;
    border-radius:15px;
    text-align:left;
    white-space:pre-line;
    font-size:20px;
}

/* VIRTUEL */
.row{
    display:flex;
    gap:10px;
}

.side{
    flex:1;
    background:#111827;
    padding:15px;
    border-radius:15px;
}

.choiceBtn{
    width:90px;
    height:70px;
    margin:5px;
    font-size:28px;
    border-radius:15px;
    background:#374151;
}

.choiceBtn.active{
    background:#22c55e;
}

.titleSide{
    font-size:20px;
    margin-bottom:10px;
}

.red{ color:red; }
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container">
    <h2>TSIX VIP PRO</h2>
    <input type="password" id="pass" placeholder="Mot de passe">
    <button onclick="login()">ENTRER</button>
</div>

<!-- WRITE BOX (Tsitsi only) -->
<div class="container" id="writeBox" style="display:none;">
    <h3>✍️ Mpanoratra (Tsitsi)</h3>
    <textarea id="message" placeholder="Soraty eto..."></textarea>
    <button onclick="sendMessage()">Alefa</button>
</div>

<!-- POSTS -->
<div class="container">
    <h2>💬 Messages</h2>
    <div id="posts"></div>
</div>

<!-- VIRTUEL -->
<div class="container">
<h2>⚽ VIRTUEL PREDICT</h2>

<div class="row">
<div class="side">
<div class="titleSide">1</div>

<button class="choiceBtn" onclick="selectBtn('left','type','Pc',this)">Pc</button>
<button class="choiceBtn" onclick="selectBtn('left','type','Gc',this)">Gc</button>
<br>
<button class="choiceBtn" onclick="selectBtn('left','arrow','⬆️',this)">⬆️</button>
<button class="choiceBtn" onclick="selectBtn('left','arrow','⬇️',this)">⬇️</button>
<br>
<button class="choiceBtn" onclick="selectBtn('left','sign','✅',this)">✅</button>
<button class="choiceBtn" onclick="selectBtn('left','sign','✖️',this)">✖️</button>
<button class="choiceBtn" onclick="selectBtn('left','sign','➖',this)">➖</button>
</div>

<div class="side">
<div class="titleSide">2</div>

<button class="choiceBtn" onclick="selectBtn('right','type','Pc',this)">Pc</button>
<button class="choiceBtn" onclick="selectBtn('right','type','Gc',this)">Gc</button>
<br>
<button class="choiceBtn" onclick="selectBtn('right','arrow','⬆️',this)">⬆️</button>
<button class="choiceBtn" onclick="selectBtn('right','arrow','⬇️',this)">⬇️</button>
<br>
<button class="choiceBtn" onclick="selectBtn('right','sign','✅',this)">✅</button>
<button class="choiceBtn" onclick="selectBtn('right','sign','✖️',this)">✖️</button>
<button class="choiceBtn" onclick="selectBtn('right','sign','➖',this)">➖</button>

</div>
</div>

<button onclick="predictVirtuel()">PREDICT</button>
<div class="result" id="virtuelResult"></div>
</div>

<!-- AVIATOR -->
<div class="container">
<h2>✈️ AVIATOR PREDICT</h2>

<p class="red">
- Natao hanampy anao<br>
- Araho tsara ny valiny
</p>

<input id="time" placeholder="12:19:50">
<input id="coteA" placeholder="1.75">

<button onclick="predictAviator()">PREDICT</button>
<div class="result" id="aviatorResult"></div>
</div>

<!-- FOOTER -->
<div class="container">
<p>
👉 araho ito pejy ito: <br>
https://www.facebook.com/profile.php?id=61579106375751
</p>
</div>

<script>

/* LOGIN */
let role = "";

function login(){
    let p = document.getElementById("pass").value;

    if(p === "Larokaman"){
        role = "viewer";
        alert("Mode mpijery 👀");
        document.getElementById("writeBox").style.display="none";
    }
    else if(p === "Tsitsi"){
        role = "admin";
        alert("Mode mpanoratra ✍️");
        document.getElementById("writeBox").style.display="block";
    }
    else{
        alert("Mot de passe diso ❌");
    }
}

/* WRITE */
function sendMessage(){
    if(role !== "admin"){
        alert("Tsy mahazo manoratra ianao ❌");
        return;
    }

    let text = document.getElementById("message").value;
    if(!text) return;

    let div = document.createElement("div");
    div.className="result";
    div.innerText=text;

    document.getElementById("posts").appendChild(div);
    document.getElementById("message").value="";
}

/* VIRTUEL */
let left={}, right={};

function selectBtn(side,cat,val,el){
    let obj = side==="left"?left:right;

    if(cat==="type"){
        obj.type=val;
    }
    if(cat==="arrow"){
        obj.arrow=val;
    }
    if(cat==="sign"){
        obj.sign=val;
    }

    el.classList.add("active");
}

const rules = {
"Gc⬆️➖|Pc⬇️➖":"1 boom🏅",
"Pc⬆️➖|Gc⬇️➖":"Tsy mbola misy strategie 😭",
"Gc⬇️➖|Pc⬆️➖":"Match nul 👌",
"Pc⬇️➖|Gc⬆️➖":"1 boom🏅",
"Gc⬆️✖️|Pc⬇️➖":"1 boom🏅",
"Pc⬆️✖️|Gc⬇️➖":"1 boom🏅",
"Gc⬇️➖|Pc⬆️✖️":"2 boom🏅",
"Pc⬇️➖|Gc⬆️✖️":"2 boom🏅"
};

function predictVirtuel(){

    if(!left.type||!left.arrow||!left.sign||!right.type||!right.arrow||!right.sign){
        alert("Fenoy tsara");
        return;
    }

    let key = left.type+left.arrow+left.sign+"|"+right.type+right.arrow+right.sign;

    document.getElementById("virtuelResult").innerHTML =
    `<div style="font-size:26px;font-weight:bold">${rules[key] || "Tsy mbola misy strategie 😭"}</div>`;
}

/* AVIATOR */
function addTime(time, sec){
    let t=time.split(":");
    let d=new Date();
    d.setHours(t[0]); d.setMinutes(t[1]); d.setSeconds(t[2]);
    d.setSeconds(d.getSeconds()+sec);
    return d.toTimeString().split(" ")[0];
}

function predictAviator(){
    let time=document.getElementById("time").value;
    let cote=parseFloat(document.getElementById("coteA").value);

    if(!time||isNaN(cote)){
        alert("Fenoy tsara");
        return;
    }

    let res=document.getElementById("aviatorResult");
    res.innerHTML="";

    function show(t,x){
        res.innerHTML+=`<div class="result"><b>${t}</b> → ${x}</div>`;
    }

    if(cote>=10){
        show(addTime(time,64),"🟣 Violet");
        show(addTime(time,80),"🔵 Bleu");
    }
    else if(cote>=5){
        show(addTime(time,80),"🟣60% 🔵30%");
    }
    else{
        show(addTime(time,80),"🟣50% 🔵50%");
    }
}

</script>

</body>
    </html>
