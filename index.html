<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>AVIATOR PREDICT</title>

<style>
body{
    background:#0b1220;
    color:white;
    font-family:Arial;
    padding:20px;
}

.container{
    max-width:400px;
    margin:auto;
}

.title{
    text-align:center;
    font-size:22px;
    margin-bottom:10px;
}

.note{
    color:red;
    font-size:14px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:15px;
    margin-top:10px;
    border-radius:15px;
    border:none;
    background:#1c2435;
    color:white;
    font-size:18px;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:20px;
    background:#7c3aed;
    color:white;
    font-size:20px;
}

.result{
    margin-top:20px;
}

.box{
    border:1px dashed #444;
    padding:15px;
    margin-top:10px;
    border-radius:15px;
}

.card{
    background:#2a1e5c;
    padding:15px;
    border-radius:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:18px;
}

.violet{
    background:#5b21b6;
}

.bleu{
    background:#1d4ed8;
}

.big{
    font-size:20px;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<div id="login">
    <h2>Mot de passe</h2>
    <input type="password" id="pass" placeholder="Ampidiro ny mot de passe">
    <button onclick="checkPass()">Entrer</button>
</div>

<div id="app" style="display:none">

    <div class="title">AVIATOR PREDICT</div>

    <div class="note">
        - Natao hanampy anao<br>
        - Ra misy tsy mazava dia mandefasa mp @ TSIX na Laroka man
    </div>

    <label>Ora (HH:MM:SS)</label>
    <input id="time" placeholder="12:19:50">

    <label>Cote</label>
    <input id="cote" placeholder="1.75">

    <button onclick="predict()">PREDICT</button>

    <div class="result" id="result"></div>

</div>

</div>

<script>

function checkPass(){
    let p = document.getElementById("pass").value;
    if(p==="Tsix56"){
        document.getElementById("login").style.display="none";
        document.getElementById("app").style.display="block";
    }else{
        alert("Diso mot de passe");
    }
}

function addTime(time, sec){
    let t = time.split(":");
    let date = new Date();
    date.setHours(t[0]);
    date.setMinutes(t[1]);
    date.setSeconds(t[2]);

    date.setSeconds(date.getSeconds()+sec);

    return date.toTimeString().split(" ")[0];
}

function predict(){
    let time = document.getElementById("time").value;
    let cote = parseFloat(document.getElementById("cote").value);
    let res = document.getElementById("result");

    if(!time || isNaN(cote)){
        alert("Fenoy tsara");
        return;
    }

    res.innerHTML="";

    function show(t, txt, color){
        res.innerHTML += `
        <div class="box">
            <div class="card ${color}">
                <span class="big">${t}</span>
                <span>${txt}</span>
            </div>
        </div>`;
    }

    // === STRATEGIE ===

    if(cote >= 10){
        show(addTime(time,64),"🟣 Tour violet","violet");
        show(addTime(time,80),"🔵 Tour bleu","bleu");
        show(addTime(time,140),"🟣 Tour violet","violet");
    }

    else if(cote >=5){
        show(addTime(time,80),
        "🟣 60% | 🌸 30% | 🔴 40% | 🔵 30%","violet");
        show(addTime(time,140),"🟣 Tour violet","violet");
    }

    else if(cote >=2){
        show(addTime(time,60),"🟣 Tour violet","violet");
        show(addTime(time,80),"🟣 Tour violet","violet");
        show(addTime(time,140),"🟣 60%","violet");
    }

    else if(cote >=1.5){
        show(addTime(time,80),"🟣 Tour violet","violet");
        show(addTime(time,140),"🟣 Tour violet","violet");
    }

    else{
        show(addTime(time,80),"🟣 50% | 🔵 50%","violet");
        show(addTime(time,140),"🟣 50% | 🔵 50%","violet");
    }

}

</script>

</body>
    </html>
