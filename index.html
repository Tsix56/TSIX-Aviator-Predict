<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TSIX VIP PRO</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js"></script>

<style>
body{
    background:#0b1220;
    color:white;
    font-family:Arial;
    padding:15px;
}
.box{
    max-width:400px;
    margin:auto;
    margin-bottom:40px;
    padding:20px;
    background:#111827;
    border-radius:20px;
}
h2{text-align:center;}
input,button{
    width:100%;
    padding:15px;
    margin-top:10px;
    border-radius:15px;
    border:none;
}
button{background:#22c55e;color:white;}
.result{margin-top:15px;}
.card{
    background:#1f2937;
    padding:12px;
    border-radius:12px;
    margin-top:10px;
    line-height:1.5;
}
</style>
</head>

<body>

<!-- ================= TSIX PRO ================= -->
<div class="box" id="login1">
    <h2>- VIP<br>- Virtuel English league</h2>
    <input type="password" id="pass1" placeholder="Mot de passe">
    <button onclick="loginTsix()">Entrer</button>
</div>

<div class="box" id="app1" style="display:none">
    <h2>⚽ TSIX PRO PREDICT</h2>

    <input type="file" id="img">

    <button onclick="analyze()">Analyser</button>

    <div id="out1" class="result"></div>
</div>

<!-- ================= AVIATOR ================= -->
<div class="box" id="login2">
    <h2>✈️ AVIATOR VIP</h2>
    <input type="password" id="pass2" placeholder="Mot de passe">
    <button onclick="loginAviator()">Entrer</button>
</div>

<div class="box" id="app2" style="display:none">

    <h2>AVIATOR PREDICT</h2>

    <input id="time" placeholder="12:19:50">
    <input id="cote" placeholder="1,75">

    <button onclick="predictAviator()">PREDICT</button>

    <div id="out2" class="result"></div>

</div>

<script>

// ================= LOGIN =================
function loginTsix(){
    let p=document.getElementById("pass1").value;
    if(p==="56Tsix"){
        document.getElementById("login1").style.display="none";
        document.getElementById("app1").style.display="block";
    }else{
        alert("Diso mot de passe");
    }
}

function loginAviator(){
    let p=document.getElementById("pass2").value;
    if(p==="Tsix56"){
        document.getElementById("login2").style.display="none";
        document.getElementById("app2").style.display="block";
    }else{
        alert("Diso mot de passe");
    }
}

// ================= TSIX PRO (OCR + STRATEGIE V4) =================
function analyze(){

    let file=document.getElementById("img").files[0];
    let out=document.getElementById("out1");

    if(!file){
        alert("Asio sary");
        return;
    }

    out.innerHTML="Analyse...";

    Tesseract.recognize(file,'eng').then(res=>{

        let text=res.data.text;

        let odds=text.match(/\d+[.,]\d+/g);

        if(!odds){
            out.innerHTML="Tsy voavaky tsara ilay sary";
            return;
        }

        out.innerHTML="";

        odds.forEach(o=>{

            let cote=parseFloat(o.replace(/,/g,"."));

            let win="",but="",score="";

            // 🔥 STRATEGIE TSIX PRO V4
            if(cote <=1.30){
                win="Favori matanjaka (WIN)";
                but="2 - 4 buts";
                score="2-0 / 3-0 / 3-1";
            }
            else if(cote <=1.70){
                win="Favori (WIN)";
                but="2 - 3 buts";
                score="2-1 / 2-0 / 3-1";
            }
            else if(cote <=2.50){
                win="Match ouvert (BTTS)";
                but="2 - 4 buts";
                score="1-1 / 2-1 / 2-2";
            }
            else{
                win="Surprise possible";
                but="1 - 3 buts";
                score="1-2 / 0-1 / 1-1";
            }

            out.innerHTML += `
            <div class="card">
            🔢 Cote: ${cote}<br>
            🏆 ${win}<br>
            ⚽ Nombre de but: ${but}<br>
            🎯 Score zone: ${score}
            </div>
            `;

        });

    });

}

// ================= AVIATOR (STRATEGIE ORIGINAL + FIX) =================

function addTime(time,sec){
    let t=time.split(":");
    let d=new Date();

    d.setHours(parseInt(t[0]));
    d.setMinutes(parseInt(t[1]));
    d.setSeconds(parseInt(t[2]));

    d.setSeconds(d.getSeconds()+sec);

    return d.toTimeString().split(" ")[0];
}

function predictAviator(){

    let time=document.getElementById("time").value;
    let cote=parseFloat(document.getElementById("cote").value.replace(/,/g,"."));
    let out=document.getElementById("out2");

    if(!time || isNaN(cote)){
        alert("Fenoy tsara");
        return;
    }

    out.innerHTML="";

    function show(t,txt){
        out.innerHTML += `<div class="card">${t} → ${txt}</div>`;
    }

    // 🔥 STRATEGIE AVIATOR (TSY NOVAINA)
    if(cote >= 10){
        show(addTime(time,64),"🟣 Tour violet");
        show(addTime(time,80),"🔵 Tour bleu");
        show(addTime(time,140),"🟣 Tour violet");
    }

    else if(cote >=5){
        show(addTime(time,80),"🟣 60% | 🌸 30% | 🔴 40% | 🔵 30%");
        show(addTime(time,140),"🟣 Tour violet");
    }

    else if(cote >=2){
        show(addTime(time,60),"🟣 Tour violet");
        show(addTime(time,80),"🟣 Tour violet");
        show(addTime(time,140),"🟣 60%");
    }

    else if(cote >=1.5){
        show(addTime(time,80),"🟣 Tour violet");
        show(addTime(time,140),"🟣 Tour violet");
    }

    else{
        show(addTime(time,80),"🟣 50% | 🔵 50%");
        show(addTime(time,140),"🟣 50% | 🔵 50%");
    }
}

</script>

</body>
</html>
