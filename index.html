<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TSIX VIP</title>

<style>
body{
    background:#0b1220;
    color:white;
    font-family:Arial;
    padding:20px;
}

.container{
    max-width:400px;
    margin:auto;
    margin-bottom:40px;
    padding:20px;
    background:#111827;
    border-radius:20px;
}

.title{
    text-align:center;
    font-size:22px;
    margin-bottom:10px;
}

input{
    width:100%;
    padding:15px;
    margin-top:10px;
    border-radius:15px;
    border:none;
    background:#1c2435;
    color:white;
    font-size:18px;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:20px;
    background:#22c55e;
    color:white;
    font-size:18px;
}

.result{
    margin-top:20px;
}

.box{
    border:1px dashed #444;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
}

.card{
    padding:15px;
    border-radius:15px;
    margin-top:10px;
    font-weight:bold;
}

.violet{background:#5b21b6;}
.bleu{background:#1d4ed8;}
.green{background:#16a34a;}
.orange{background:#ea580c;}
.red{background:#dc2626;}
</style>

</head>

<body>

<!-- ================= TSIX PRO ================= -->
<div class="container">

<div id="login1">
    <div class="title">
        - VIP<br>
        - Virtuel English league
    </div>

    <input type="password" id="pass1" placeholder="Mot de passe">
    <button onclick="checkPass1()">Entrer</button>
</div>

<div id="app1" style="display:none">

    <div class="title">⚽ TSIX PRO PREDICT</div>

    <input id="match" placeholder="1.29 - 5.29 - 10.14">
    <button onclick="predictFoot()">ANALYSER</button>

    <div class="result" id="resFoot"></div>

</div>

</div>

<!-- ================= AVIATOR ================= -->
<div class="container">

<div id="login2">
    <div class="title">✈️ AVIATOR VIP</div>

    <input type="password" id="pass2" placeholder="Mot de passe">
    <button onclick="checkPass2()">Entrer</button>
</div>

<div id="app2" style="display:none">

    <div class="title">AVIATOR PREDICT</div>

    <input id="time" placeholder="12:19:50">
    <input id="cote" placeholder="1.75">

    <button onclick="predictAviator()">PREDICT</button>

    <div class="result" id="resAviator"></div>

</div>

</div>

<script>

// ================= PASSWORD =================
function checkPass1(){
    if(document.getElementById("pass1").value === "56Tsix"){
        login1.style.display="none";
        app1.style.display="block";
    }else{
        alert("Diso mot de passe");
    }
}

function checkPass2(){
    if(document.getElementById("pass2").value === "Tsix56"){
        login2.style.display="none";
        app2.style.display="block";
    }else{
        alert("Diso mot de passe");
    }
}

// ================= TSIX PRO STRATEGIE (TSY NOVAINA) =================
function predictFoot(){
    let val = document.getElementById("match").value.replace(",",".");
    let arr = val.split("-");

    let res = document.getElementById("resFoot");
    res.innerHTML="";

    if(arr.length < 3){
        alert("Ampidiro cote 3");
        return;
    }

    let home = parseFloat(arr[0]);
    let draw = parseFloat(arr[1]);
    let away = parseFloat(arr[2]);

    function show(txt,color){
        res.innerHTML += `<div class="card ${color}">${txt}</div>`;
    }

    // === STRATEGIE ORIGINAL ===

    if(home <= 1.30){
        show("Mandresy mazava ilay favoris","green");
        show("Score: 3-0 na 4-0","violet");
        show("Nombre de but: 3 - 5","orange");
    }

    else if(home <= 1.60){
        show("Favoris mbola matanjaka","green");
        show("Score: 2-0 na 2-1","violet");
        show("Nombre de but: 2 - 3","orange");
    }

    else if(home <= 2.20){
        show("Match somary sarotra","orange");
        show("Score: 1-1 na 2-1","violet");
        show("Nombre de but: 2 - 3","orange");
    }

    else{
        show("Match risqué","red");
        show("Score: 1-1","violet");
        show("Nombre de but: 1 - 3","orange");
    }
}

// ================= AVIATOR STRATEGIE (TSY NOVAINA) =================

function addTime(time, sec){
    let t = time.split(":");
    let date = new Date();
    date.setHours(t[0]);
    date.setMinutes(t[1]);
    date.setSeconds(t[2]);
    date.setSeconds(date.getSeconds()+sec);
    return date.toTimeString().split(" ")[0];
}

function predictAviator(){
    let time = document.getElementById("time").value;
    let cote = parseFloat(document.getElementById("cote").value);
    let res = document.getElementById("resAviator");

    if(!time || isNaN(cote)){
        alert("Fenoy tsara");
        return;
    }

    res.innerHTML="";

    function show(t, txt, color){
        res.innerHTML += `
        <div class="box">
            <div class="card ${color}">
                ${t} → ${txt}
            </div>
        </div>`;
    }

    // === STRATEGIE ORIGINAL (ILAY NALENAO) ===

    if(cote >= 10){
        show(addTime(time,64),"🟣 Tour violet","violet");
        show(addTime(time,80),"🔵 Tour bleu","bleu");
        show(addTime(time,140),"🟣 Tour violet","violet");
    }

    else if(cote >=5){
        show(addTime(time,80),
        "🟣 60% | 🌸 30% | 🔴 40% | 🔵 30%","violet");
        show(addTime(time,140),"🟣 Tour violet","violet");
    }

    else if(cote >=2){
        show(addTime(time,60),"🟣 Tour violet","violet");
        show(addTime(time,80),"🟣 Tour violet","violet");
        show(addTime(time,140),"🟣 60%","violet");
    }

    else if(cote >=1.5){
        show(addTime(time,80),"🟣 Tour violet","violet");
        show(addTime(time,140),"🟣 Tour violet","violet");
    }

    else{
        show(addTime(time,80),"🟣 50% | 🔵 50%","violet");
        show(addTime(time,140),"🟣 50% | 🔵 50%","violet");
    }
}

</script>

</body>
</html>
