<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TSIX AVIATOR PREDICT</title>

<style>
body{
    background:black;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{
    color:white;
}

.note{
    color:red;
    margin-bottom:20px;
}

input{
    padding:10px;
    margin:10px;
    font-size:18px;
    width:200px;
}

button{
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
}

.result{
    margin-top:20px;
    font-size:20px;
}
</style>
</head>

<body>

<h1>TSIX AVIATOR PREDICT</h1>

<div class="note">
-Natao hanampy anao<br>
-Raha misy tsy mazava midira mp @ TSIX na Laroka man
</div>

<p>Code: <b>tsix56</b></p>

<input type="time" id="time" step="1"><br>
<input type="number" id="tour" step="0.01" placeholder="Ex: 1.20"><br>

<button onclick="predict()">Predict</button>

<div class="result" id="result"></div>

<script>
function addOneMinute(time){
    let parts = time.split(":");
    let date = new Date();
    date.setHours(parts[0]);
    date.setMinutes(parts[1]);
    date.setSeconds(parts[2]);

    date.setMinutes(date.getMinutes() + 1);

    return date.toTimeString().split(" ")[0];
}

function predict(){
    let time = document.getElementById("time").value;
    let tour = parseFloat(document.getElementById("tour").value);

    if(!time || !tour){
        alert("Fenoy tsara!");
        return;
    }

    let nextTime = addOneMinute(time);
    let result = "";

    if(tour >= 1.00 && tour <= 1.50){
        result = "➡️ " + nextTime + " → 1.50 - 1.90";
    }
    else if(tour >= 1.51 && tour <= 1.99){
        result = "➡️ " + nextTime + " → 2.00+ na =2";
    }
    else if(tour >= 2.00){
        result = "➡️ " + nextTime + " → +2";
    }
    else{
        result = "Tsy fantatra";
    }

    document.getElementById("result").innerText = result;
}
</script>

</body>
  </html>
