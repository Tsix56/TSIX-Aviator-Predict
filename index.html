<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TSIX PRO + AVIATOR</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js"></script>

<style>
body{
    background:#0b1220;
    color:white;
    font-family:Arial;
    padding:15px;
}
.box{
    max-width:400px;
    margin:auto;
    margin-bottom:40px;
    padding:20px;
    background:#111827;
    border-radius:20px;
}
h2{text-align:center;}
input,button{
    width:100%;
    padding:15px;
    margin-top:10px;
    border-radius:15px;
    border:none;
}
button{background:#22c55e;color:white;}
.result{margin-top:15px;}
.card{
    background:#1f2937;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<!-- ================= TSIX PRO ================= -->
<div class="box" id="login1">
    <h2>- VIP<br>- Virtuel English league</h2>
    <input type="password" id="pass1" placeholder="Mot de passe">
    <button onclick="login1()">Entrer</button>
</div>

<div class="box" id="app1" style="display:none">
    <h2>⚽ TSIX PRO PREDICT</h2>

    <input type="file" id="img">

    <button onclick="analyze()">Analyser</button>

    <div id="out1" class="result"></div>
</div>

<!-- ================= AVIATOR ================= -->
<div class="box" id="login2">
    <h2>AVIATOR</h2>
    <input type="password" id="pass2" placeholder="Mot de passe">
    <button onclick="login2()">Entrer</button>
</div>

<div class="box" id="app2" style="display:none">

    <h2>AVIATOR PREDICT</h2>

    <input id="time" placeholder="12:19:50">
    <input id="cote" placeholder="1,75">

    <button onclick="predict()">PREDICT</button>

    <div id="out2" class="result"></div>
</div>

<script>

// LOGIN
function login1(){
    if(document.getElementById("pass1").value==="56Tsix"){
        login1.style.display="none";
        app1.style.display="block";
    }else alert("Diso");
}

function login2(){
    if(document.getElementById("pass2").value==="Tsix56"){
        login2.style.display="none";
        app2.style.display="block";
    }else alert("Diso");
}

// ================= TSIX PRO ANALYSE =================
function analyze(){
    let file = document.getElementById("img").files[0];
    let out = document.getElementById("out1");

    if(!file){
        alert("Asio sary");
        return;
    }

    out.innerHTML="Analyse...";

    Tesseract.recognize(file,'eng').then(res=>{
        let text = res.data.text;

        // simple detection odds
        let matches = text.match(/\d+[.,]\d+/g);

        if(!matches){
            out.innerHTML="Tsy voavaky tsara ilay sary";
            return;
        }

        out.innerHTML="";

        matches.forEach((m,i)=>{

            let odd = parseFloat(m.replace(",","."));

            let win="",but="",score="";

            // 🔥 STRATEGIE VAOVAO (FIX)
            if(odd < 1.40){
                win="Favori";
                but="2-4 buts";
                score="2-0 / 3-0 / 3-1";
            }
            else if(odd < 2){
                win="Favori malemy";
                but="2-3 buts";
                score="2-1 / 2-0 / 3-1";
            }
            else if(odd < 3){
                win="Match ouvert";
                but="2-4 buts";
                score="1-1 / 2-1 / 1-2";
            }
            else{
                win="Surprise possible";
                but="1-3 buts";
                score="0-1 / 1-2 / 1-1";
            }

            out.innerHTML += `
            <div class="card">
            🔢 Cote: ${odd}<br>
            🏆 ${win}<br>
            ⚽ ${but}<br>
            🎯 ${score}
            </div>`;
        });

    });
}

// ================= AVIATOR =================
function addTime(time,sec){
    let t=time.split(":");
    let d=new Date();
    d.setHours(t[0],t[1],t[2]);
    d.setSeconds(d.getSeconds()+sec);
    return d.toTimeString().split(" ")[0];
}

function predict(){
    let time=document.getElementById("time").value;
    let cote=parseFloat(document.getElementById("cote").value.replace(",",".")); // virgule OK
    let out=document.getElementById("out2");

    if(!time || isNaN(cote)){
        alert("Fenoy tsara");
        return;
    }

    out.innerHTML="";

    function show(t,txt){
        out.innerHTML += `<div class="card">${t} → ${txt}</div>`;
    }

    // STRATEGIE AVIATOR (tsy novaina)
    if(cote>=10){
        show(addTime(time,64),"Violet");
        show(addTime(time,80),"Bleu");
        show(addTime(time,140),"Violet");
    }
    else if(cote>=5){
        show(addTime(time,80),"Mix");
        show(addTime(time,140),"Violet");
    }
    else if(cote>=2){
        show(addTime(time,60),"Violet");
        show(addTime(time,80),"Violet");
    }
    else{
        show(addTime(time,80),"50/50");
    }
}

</script>

</body>
    </html>
